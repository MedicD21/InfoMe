# XcodeGen project specification — generates InfoMe.xcodeproj
# Install XcodeGen:  brew install xcodegen
# Generate project:  xcodegen generate
#
# Change BUNDLE_ID_PREFIX and DEVELOPMENT_TEAM below to your own before
# generating — XcodeGen fans these settings out to every target, the App
# Clip, and both widget extensions.

name: InfoMe

options:
  bundleIdPrefix: com.dushin.infome
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settingGroups:
  shared:
    DEVELOPMENT_TEAM: "286LKF859M"
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    APP_GROUP_ID: "group.com.dushin.infome"
    ICLOUD_CONTAINER_ID: "iCloud.com.dushin.infome"
    SHARE_DOMAIN: "infome.app"

packages:
  InfoMeKit:
    path: Packages/InfoMeKit

targets:
  # ------------------------------------------------------------------
  # Main iOS app
  # ------------------------------------------------------------------
  InfoMe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/App
      - path: Resources/App/Assets.xcassets
    dependencies:
      - package: InfoMeKit
        product: InfoMeKit
      - target: InfoMeClip
        embed: true
        codeSign: true
      - target: "InfoMe Watch App"
        embed: true
        codeSign: true
      - target: InfoMeWidgets
        embed: true
        codeSign: true
    info:
      path: Resources/App/Info.plist
      properties:
        CFBundleDisplayName: InfoMe
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NFCReaderUsageDescription: "InfoMe reads NFC tags so you can tap your phone to someone else's InfoMe card, and writes your own share link to blank tags you own."
        NSContactsUsageDescription: "InfoMe can save scanned cards directly to your Contacts."
        NSPhotoLibraryAddUsageDescription: "Save your QR code as an image to your Photos."
        NSCameraUsageDescription: "Scan someone else's InfoMe QR code."
        com.apple.developer.nfc.readersession.formats:
          - NDEF
          - TAG
        NSUserActivityTypes:
          - OpenCardIntent
    entitlements:
      path: Resources/App/InfoMe.entitlements
      properties:
        com.apple.security.application-groups:
          - "$(APP_GROUP_ID)"
        com.apple.developer.icloud-container-identifiers:
          - "$(ICLOUD_CONTAINER_ID)"
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.associated-domains:
          - "applinks:$(SHARE_DOMAIN)"
          - "appclips:$(SHARE_DOMAIN)"
        com.apple.developer.nfc.readersession.formats:
          - NDEF
          - TAG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.infome
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
      groups: [shared]

  # ------------------------------------------------------------------
  # App Clip — the recipient-facing "Linktree" experience
  # ------------------------------------------------------------------
  InfoMeClip:
    type: application.on-demand-install-capable
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/AppClip
      - path: Resources/AppClip/Assets.xcassets
    dependencies:
      - package: InfoMeKit
        product: InfoMeKit
    info:
      path: Resources/AppClip/Info.plist
      properties:
        CFBundleDisplayName: InfoMe
        UILaunchScreen: {}
        NSContactsUsageDescription: "Save this card directly to your Contacts."
        NSCameraUsageDescription: "Scan another InfoMe QR code."
    entitlements:
      path: Resources/AppClip/InfoMeClip.entitlements
      properties:
        com.apple.security.application-groups:
          - "$(APP_GROUP_ID)"
        com.apple.developer.icloud-container-identifiers:
          - "$(ICLOUD_CONTAINER_ID)"
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.associated-domains:
          - "appclips:$(SHARE_DOMAIN)"
          - "applinks:$(SHARE_DOMAIN)"
        com.apple.developer.parent-application-identifiers:
          - "$(AppIdentifierPrefix)com.dushin.infome"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.infome.Clip
        PRODUCT_NAME: InfoMeClip
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
      groups: [shared]

  # ------------------------------------------------------------------
  # watchOS companion app
  # ------------------------------------------------------------------
  "InfoMe Watch App":
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/WatchApp
      - path: Resources/WatchApp/Assets.xcassets
    dependencies:
      - package: InfoMeKit
        product: InfoMeKit
      - target: InfoMeWatchWidgets
        embed: true
        codeSign: true
    info:
      path: Resources/WatchApp/Info.plist
      properties:
        CFBundleDisplayName: InfoMe
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.dushin.infome
        WKWatchOnly: false
        NSUserActivityTypes:
          - OpenCardIntent
        CFBundleURLTypes:
          - CFBundleURLName: com.dushin.infome.share
            CFBundleURLSchemes:
              - infome
    entitlements:
      path: Resources/WatchApp/InfoMeWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - "$(APP_GROUP_ID)"
        com.apple.developer.icloud-container-identifiers:
          - "$(ICLOUD_CONTAINER_ID)"
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.infome.watchkitapp
        PRODUCT_NAME: "InfoMe Watch App"
        SKIP_INSTALL: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.dushin.infome
      groups: [shared]

  # ------------------------------------------------------------------
  # iOS WidgetKit extension — Lock Screen / Home Screen / Control Center
  # (the ControlWidget here is what plugs into Settings → Action Button → Controls)
  # ------------------------------------------------------------------
  InfoMeWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Widgets
    dependencies:
      - package: InfoMeKit
        product: InfoMeKit
    info:
      path: Resources/Widgets/Info.plist
      properties:
        CFBundleDisplayName: InfoMe Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Resources/Widgets/InfoMeWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - "$(APP_GROUP_ID)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.infome.Widgets
        PRODUCT_NAME: InfoMeWidgets
        SKIP_INSTALL: YES
      groups: [shared]

  # ------------------------------------------------------------------
  # watchOS WidgetKit extension — watch-face complications ("compilations")
  # ------------------------------------------------------------------
  InfoMeWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/WatchWidgets
    dependencies:
      - package: InfoMeKit
        product: InfoMeKit
    info:
      path: Resources/WatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: InfoMe
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Resources/WatchWidgets/InfoMeWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - "$(APP_GROUP_ID)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.infome.watchkitapp.Widgets
        PRODUCT_NAME: InfoMeWatchWidgets
        SKIP_INSTALL: YES
      groups: [shared]

schemes:
  InfoMe:
    build:
      targets:
        InfoMe: all
    run:
      config: Debug
    archive:
      config: Release
  InfoMeClip:
    build:
      targets:
        InfoMeClip: all
    run:
      config: Debug
  "InfoMe Watch App":
    build:
      targets:
        "InfoMe Watch App": all
    run:
      config: Debug
